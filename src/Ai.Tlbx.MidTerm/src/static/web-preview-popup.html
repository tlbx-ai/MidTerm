<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Preview - MidTerm</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=__MIDTERM_ASSET_VERSION__" />
    <link rel="stylesheet" href="/css/app.css?v=__MIDTERM_ASSET_VERSION__" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body::before,
        body::after {
            content: none !important;
        }
        body {
            font-family: var(--font-ui);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            display: flex;
            align-items: center;
            height: 32px;
            padding: 0 8px;
            gap: 6px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .toolbar-url {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toolbar-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        .toolbar-btn:hover {
            background: var(--bg-hover);
        }
        .preview-host {
            flex: 1;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            overflow: auto;
            background: var(--bg-primary);
        }
        .preview-host.viewport-constrained {
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: var(--bg-tertiary);
        }
        iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: var(--bg-elevated);
        }
        .preview-host.viewport-constrained iframe {
            flex: none;
            box-shadow: 0 0 0 1px var(--border-color);
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="toolbar-url" id="url-display"></span>
        <button class="toolbar-btn" id="refresh-btn" title="Refresh">&#x21bb;</button>
        <button class="toolbar-btn" id="dock-back-btn">Dock back</button>
    </div>
    <div class="preview-host" id="preview-host">
        <iframe id="preview-frame" src="about:blank" allow="camera *; microphone *; geolocation *; fullscreen *; autoplay *; clipboard-read *; clipboard-write *; display-capture *"></iframe>
    </div>

    <script src="/js/web-preview-popup.js?v=__MIDTERM_ASSET_VERSION__"></script>
</body>
</html>
