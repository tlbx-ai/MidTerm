<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Preview - MidTerm</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            display: flex;
            align-items: center;
            height: 32px;
            padding: 0 8px;
            gap: 6px;
            background: #181825;
            border-bottom: 1px solid #313244;
            flex-shrink: 0;
        }
        .toolbar-url {
            flex: 1;
            font-family: monospace;
            font-size: 12px;
            color: #a6adc8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toolbar-btn {
            background: none;
            border: 1px solid #313244;
            color: #cdd6f4;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        .toolbar-btn:hover {
            background: #313244;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="toolbar-url" id="url-display"></span>
        <button class="toolbar-btn" id="refresh-btn" title="Refresh">&#x21bb;</button>
        <button class="toolbar-btn" id="dock-back-btn">Dock back</button>
    </div>
    <iframe id="preview-frame" src="about:blank" allow="camera *; microphone *; geolocation *; fullscreen *; autoplay *; clipboard-read *; clipboard-write *; display-capture *"></iframe>

    <script src="/js/web-preview-popup.js?v=__MIDTERM_ASSET_VERSION__"></script>
</body>
</html>
