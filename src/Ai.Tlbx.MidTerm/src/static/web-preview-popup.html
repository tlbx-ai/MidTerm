<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Preview - MidTerm</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            display: flex;
            align-items: center;
            height: 32px;
            padding: 0 8px;
            gap: 6px;
            background: #181825;
            border-bottom: 1px solid #313244;
            flex-shrink: 0;
        }
        .toolbar-url {
            flex: 1;
            font-family: monospace;
            font-size: 12px;
            color: #a6adc8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toolbar-btn {
            background: none;
            border: 1px solid #313244;
            color: #cdd6f4;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        .toolbar-btn:hover {
            background: #313244;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="toolbar-url" id="url-display"></span>
        <button class="toolbar-btn" id="refresh-btn" title="Refresh">&#x21bb;</button>
        <button class="toolbar-btn" id="dock-back-btn">Dock back</button>
    </div>
    <iframe id="preview-frame" src="about:blank"></iframe>

    <script>
        const CHANNEL_NAME = 'midterm-web-preview';
        const channel = new BroadcastChannel(CHANNEL_NAME);
        const frame = document.getElementById('preview-frame');
        const urlDisplay = document.getElementById('url-display');

        // Get URL from query parameter
        const params = new URLSearchParams(window.location.search);
        const initialUrl = params.get('url');
        if (initialUrl) {
            urlDisplay.textContent = initialUrl;
            frame.src = '/webpreview/';
        }

        // Listen for messages from parent
        channel.onmessage = function(e) {
            if (e.data.type === 'set-url') {
                urlDisplay.textContent = e.data.url;
                frame.src = '/webpreview/';
            } else if (e.data.type === 'refresh') {
                frame.src = '/webpreview/?' + Date.now();
            }
        };

        // Refresh button
        document.getElementById('refresh-btn').addEventListener('click', function() {
            frame.src = '/webpreview/?' + Date.now();
        });

        // Dock back button
        document.getElementById('dock-back-btn').addEventListener('click', function() {
            channel.postMessage({ type: 'dock-back' });
            window.close();
        });

        // Notify parent on close
        window.addEventListener('beforeunload', function() {
            channel.postMessage({ type: 'popup-closed' });
        });
    </script>
</body>
</html>
