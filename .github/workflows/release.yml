name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  GIT_CONFIG_COUNT: '2'
  GIT_CONFIG_KEY_0: 'advice.detachedHead'
  GIT_CONFIG_VALUE_0: 'false'
  GIT_CONFIG_KEY_1: 'init.defaultBranch'
  GIT_CONFIG_VALUE_1: 'main'

jobs:

  # ── Create the draft release immediately so it exists before builds finish ──
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      is_dev: ${{ contains(github.ref_name, '-dev') }}
      is_web_only: ${{ steps.release-flags.outputs.is_web_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Read release flags
        id: release-flags
        run: echo "is_web_only=$(jq -r '.webOnly // false' version.json)" >> "$GITHUB_OUTPUT"

      - name: Fetch tag annotation
        run: git fetch origin tag ${{ github.ref_name }} --no-tags --force

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(git tag -l --format='%(contents:subject)' ${{ github.ref_name }})
          NOTES=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          PRERELEASE=""
          [[ "${{ github.ref_name }}" == *"-dev"* ]] && PRERELEASE="--prerelease"
          gh release create ${{ github.ref_name }} \
            $PRERELEASE \
            --title "$TITLE" \
            --notes "## What's Changed
          ${NOTES}"

  # ── Build frontend once (platform-agnostic JS/CSS/HTML) ──────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: src/**/packages.lock.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install npm packages
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --include=dev --no-audit --no-fund

      - name: Build frontend
        shell: pwsh
        run: |
          $version = (Get-Content version.json | ConvertFrom-Json).web
          $isDev = "${{ github.ref_name }}".Contains("-dev")
          $buildArgs = @{ Publish = $true; Version = $version }
          if ($isDev) { $buildArgs.DevRelease = $true }
          ./src/Ai.Tlbx.MidTerm/frontend-build.ps1 @buildArgs

      - uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/
          retention-days: 1

  # ── Build macOS + Linux, sign, and upload directly to the draft release ────
  build:
    needs: [prepare, frontend]
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            ext: ''
          - os: macos-14
            rid: osx-x64
            ext: ''
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: src/**/packages.lock.json

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/

      - name: Build mt + mthost
        if: needs.prepare.outputs.is_web_only != 'true'
        run: |
          dotnet publish src/Ai.Tlbx.MidTerm/Ai.Tlbx.MidTerm.csproj -c Release -r ${{ matrix.rid }} -p:IsPublishing=true -p:SkipFrontendBuild=true -p:ContinuousIntegrationBuild=true --verbosity minimal
          dotnet publish src/Ai.Tlbx.MidTerm.TtyHost/Ai.Tlbx.MidTerm.TtyHost.csproj -c Release -r ${{ matrix.rid }} -p:IsPublishing=true -p:ContinuousIntegrationBuild=true --verbosity minimal

      - name: Build mt only
        if: needs.prepare.outputs.is_web_only == 'true'
        run: |
          dotnet publish src/Ai.Tlbx.MidTerm/Ai.Tlbx.MidTerm.csproj -c Release -r ${{ matrix.rid }} -p:IsPublishing=true -p:SkipFrontendBuild=true -p:ContinuousIntegrationBuild=true --verbosity minimal

      - name: Import Apple Developer ID certificate
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Stage artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ github.ref_name }}
          ASSET_NAME: mt-${{ matrix.rid }}.tar.gz
        run: |
          mkdir -p staging/${{ matrix.rid }}
          cp src/Ai.Tlbx.MidTerm/bin/Release/net10.0/${{ matrix.rid }}/publish/mt${{ matrix.ext }} staging/${{ matrix.rid }}/
          cp version.json staging/${{ matrix.rid }}/

          if [[ "${{ needs.prepare.outputs.is_web_only }}" == "true" ]]; then
            PREVIOUS_URL=$(gh api "repos/${{ github.repository }}/releases?per_page=20" --jq 'first(.[] | select(.tag_name != env.CURRENT_TAG) | .assets[]? | select(.name == env.ASSET_NAME) | .browser_download_url) // ""')
            if [[ -z "$PREVIOUS_URL" ]]; then
              echo "Could not find previous asset $ASSET_NAME" >&2
              exit 1
            fi

            curl -L "$PREVIOUS_URL" -o "staging/${{ matrix.rid }}/previous.tar.gz"
            tar -xzf "staging/${{ matrix.rid }}/previous.tar.gz" -C "staging/${{ matrix.rid }}" ./mthost
            rm "staging/${{ matrix.rid }}/previous.tar.gz"
          else
            cp src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/${{ matrix.rid }}/publish/mthost${{ matrix.ext }} staging/${{ matrix.rid }}/
          fi

          if [[ "${{ matrix.rid }}" == osx-* ]]; then
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            codesign --force \
              --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
              --options runtime \
              --timestamp \
              staging/${{ matrix.rid }}/mt
            codesign --force \
              --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
              --options runtime \
              --timestamp \
              staging/${{ matrix.rid }}/mthost
            codesign --verify --strict staging/${{ matrix.rid }}/mt
            codesign --verify --strict staging/${{ matrix.rid }}/mthost
          fi

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd staging/${{ matrix.rid }}
          if command -v sha256sum &> /dev/null; then
            sha256sum mt${{ matrix.ext }} mthost${{ matrix.ext }} > SHA256SUMS.txt
          else
            shasum -a 256 mt${{ matrix.ext }} mthost${{ matrix.ext }} > SHA256SUMS.txt
          fi
          echo "=== ${{ matrix.rid }} ==="
          cat SHA256SUMS.txt

      - name: Notarize
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip -j "$RUNNER_TEMP/notarize.zip" staging/${{ matrix.rid }}/mt staging/${{ matrix.rid }}/mthost
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Sign version.json
        shell: pwsh
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: ./scripts/sign-release.ps1 -ArtifactsPath staging

      - name: Package and upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $rid = "${{ matrix.rid }}"
          $archive = "staging/mt-$rid.tar.gz"
          tar -cf - -C "staging/$rid" . | gzip -9 > $archive
          gh release upload "${{ github.ref_name }}" $archive

      - name: Clean up keychain
        if: startsWith(matrix.rid, 'osx-') && always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

  # ── Build Windows: hosted runner for dev, self-hosted with signing for stable ─
  build-windows:
    needs: [prepare, frontend]
    permissions:
      contents: write
    runs-on: ${{ needs.prepare.outputs.is_dev == 'true' && 'windows-latest' || fromJSON('["self-hosted","windows","signing"]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: src/**/packages.lock.json

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/

      - name: Build mt + mthost
        shell: pwsh
        if: needs.prepare.outputs.is_web_only != 'true'
        run: |
          dotnet publish src/Ai.Tlbx.MidTerm/Ai.Tlbx.MidTerm.csproj -c Release -r win-x64 -p:IsPublishing=true -p:SkipFrontendBuild=true -p:ContinuousIntegrationBuild=true --verbosity minimal
          dotnet publish src/Ai.Tlbx.MidTerm.TtyHost/Ai.Tlbx.MidTerm.TtyHost.csproj -c Release -r win-x64 -p:IsPublishing=true -p:ContinuousIntegrationBuild=true --verbosity minimal

      - name: Build mt only
        shell: pwsh
        if: needs.prepare.outputs.is_web_only == 'true'
        run: |
          dotnet publish src/Ai.Tlbx.MidTerm/Ai.Tlbx.MidTerm.csproj -c Release -r win-x64 -p:IsPublishing=true -p:SkipFrontendBuild=true -p:ContinuousIntegrationBuild=true --verbosity minimal

      - name: Stage artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          New-Item -ItemType Directory -Force staging/win-x64 | Out-Null
          Copy-Item src/Ai.Tlbx.MidTerm/bin/Release/net10.0/win-x64/publish/mt.exe staging/win-x64/
          Copy-Item version.json staging/win-x64/

          if ("${{ needs.prepare.outputs.is_web_only }}" -eq "true") {
            $releases = gh api "repos/${{ github.repository }}/releases?per_page=20" | ConvertFrom-Json
            $previousAsset = $releases |
              Where-Object { $_.tag_name -ne $env:CURRENT_TAG } |
              ForEach-Object { $_.assets } |
              Where-Object { $_.name -eq 'mt-win-x64.zip' } |
              Select-Object -First 1

            if ($null -eq $previousAsset) {
              throw 'Could not find previous asset mt-win-x64.zip'
            }

            $archivePath = Join-Path $PWD 'staging/win-x64/previous.zip'
            Invoke-WebRequest -Uri $previousAsset.browser_download_url -OutFile $archivePath
            Expand-Archive -Path $archivePath -DestinationPath 'staging/win-x64/previous' -Force
            Copy-Item 'staging/win-x64/previous/mthost.exe' 'staging/win-x64/mthost.exe'
            Remove-Item $archivePath -Force
            Remove-Item 'staging/win-x64/previous' -Recurse -Force
          } else {
            Copy-Item src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/win-x64/publish/mthost.exe staging/win-x64/
          }

      - name: Sign Windows binaries (Certum Authenticode)
        if: needs.prepare.outputs.is_dev != 'true'
        shell: pwsh
        run: ./scripts/sign-windows-binaries.ps1 -StagingPath staging/win-x64

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $hashes = Get-ChildItem staging/win-x64/mt.exe, staging/win-x64/mthost.exe | ForEach-Object {
            $hash = (Get-FileHash $_ -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          $hashes | Set-Content staging/win-x64/SHA256SUMS.txt
          Write-Host "=== win-x64 ==="
          Get-Content staging/win-x64/SHA256SUMS.txt

      - name: Sign version.json
        shell: pwsh
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: ./scripts/sign-release.ps1 -ArtifactsPath staging

      - name: Package and upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $archive = "staging/mt-win-x64.zip"
          if (Get-Command 7z -ErrorAction SilentlyContinue) {
            7z a -tzip -mx=9 $archive "./staging/win-x64/*" | Out-Null
          } else {
            Compress-Archive -Path "./staging/win-x64/*" -DestinationPath $archive -Force
          }
          gh release upload "${{ github.ref_name }}" $archive --clobber

  publish-npm:
    needs: [prepare, build, build-windows]
    if: needs.prepare.outputs.is_dev != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync launcher version
        run: node ./scripts/sync-npx-launcher-version.mjs

      - name: Publish npm launcher
        shell: bash
        working-directory: packages/npx-launcher
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@tlbx-ai/midterm@$VERSION" version >/dev/null 2>&1; then
            echo "@tlbx-ai/midterm@$VERSION is already published, skipping"
            exit 0
          fi
          npm publish --access public --provenance --tag latest
