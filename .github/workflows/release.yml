name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  GIT_CONFIG_COUNT: '2'
  GIT_CONFIG_KEY_0: 'advice.detachedHead'
  GIT_CONFIG_VALUE_0: 'false'
  GIT_CONFIG_KEY_1: 'init.defaultBranch'
  GIT_CONFIG_VALUE_1: 'main'

jobs:

  # ── Create the draft release immediately so it exists before builds finish ──
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Fetch tag annotation
        run: git fetch origin tag ${{ github.ref_name }} --no-tags --force

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(git tag -l --format='%(contents:subject)' ${{ github.ref_name }})
          NOTES=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          PRERELEASE=""
          [[ "${{ github.ref_name }}" == *"-dev"* ]] && PRERELEASE="--prerelease"
          gh release create ${{ github.ref_name }} \
            $PRERELEASE \
            --title "$TITLE" \
            --notes "## What's Changed
          ${NOTES}"

  # ── Build frontend once (platform-agnostic JS/CSS/HTML) ──────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install npm packages
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --include=dev --no-audit --no-fund

      - name: Build frontend
        shell: pwsh
        run: |
          $version = (Get-Content version.json | ConvertFrom-Json).web
          $isDev = "${{ github.ref_name }}".Contains("-dev")
          $buildArgs = @{ Publish = $true; Version = $version }
          if ($isDev) { $buildArgs.DevRelease = $true }
          ./src/Ai.Tlbx.MidTerm/frontend-build.ps1 @buildArgs

      - uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/
          retention-days: 1

  # ── Build each platform, sign, and upload directly to the draft release ──
  build:
    needs: [prepare, frontend]
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            ext: ''
          - os: macos-14
            rid: osx-x64
            ext: ''
          - os: windows-latest
            rid: win-x64
            ext: '.exe'
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/

      - name: Build mt + mthost
        run: |
          dotnet publish src/Ai.Tlbx.MidTerm/Ai.Tlbx.MidTerm.csproj -c Release -r ${{ matrix.rid }} -p:IsPublishing=true -p:SkipFrontendBuild=true -p:ContinuousIntegrationBuild=true --verbosity minimal
          dotnet publish src/Ai.Tlbx.MidTerm.TtyHost/Ai.Tlbx.MidTerm.TtyHost.csproj -c Release -r ${{ matrix.rid }} -p:IsPublishing=true -p:ContinuousIntegrationBuild=true --verbosity minimal

      - name: Import Apple Developer ID certificate
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging/${{ matrix.rid }}
          cp src/Ai.Tlbx.MidTerm/bin/Release/net10.0/${{ matrix.rid }}/publish/mt${{ matrix.ext }} staging/${{ matrix.rid }}/
          cp src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/${{ matrix.rid }}/publish/mthost${{ matrix.ext }} staging/${{ matrix.rid }}/
          cp version.json staging/${{ matrix.rid }}/

          if [[ "${{ matrix.rid }}" == osx-* ]]; then
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            codesign --force \
              --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
              --options runtime \
              --timestamp \
              staging/${{ matrix.rid }}/mt
            codesign --force \
              --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
              --options runtime \
              --timestamp \
              staging/${{ matrix.rid }}/mthost
            codesign --verify --strict staging/${{ matrix.rid }}/mt
            codesign --verify --strict staging/${{ matrix.rid }}/mthost
          fi

          cd staging/${{ matrix.rid }}
          if command -v sha256sum &> /dev/null; then
            sha256sum mt${{ matrix.ext }} mthost${{ matrix.ext }} > SHA256SUMS.txt
          else
            shasum -a 256 mt${{ matrix.ext }} mthost${{ matrix.ext }} > SHA256SUMS.txt
          fi
          echo "=== ${{ matrix.rid }} ==="
          cat SHA256SUMS.txt

      - name: Notarize
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip -j "$RUNNER_TEMP/notarize.zip" staging/${{ matrix.rid }}/mt staging/${{ matrix.rid }}/mthost
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          # Stapling not supported for standalone Mach-O binaries in tarballs;
          # Gatekeeper checks notarization online via quarantine bit on download.

      - name: Sign version.json
        shell: pwsh
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: ./scripts/sign-release.ps1 -ArtifactsPath staging

      - name: Package and upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $rid = "${{ matrix.rid }}"
          if ($rid -like "win-*") {
            $archive = "staging/mt-$rid.zip"
            7z a -tzip -mx=9 $archive "./staging/$rid/*" | Out-Null
          } else {
            $archive = "staging/mt-$rid.tar.gz"
            tar -cf - -C "staging/$rid" . | gzip -9 > $archive
          }
          gh release upload "${{ github.ref_name }}" $archive

      - name: Clean up keychain
        if: startsWith(matrix.rid, 'osx-') && always()
        run: security delete-keychain "$KEYCHAIN_PATH"

